<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; background: #1e1e1e; overflow: hidden; }
        /* 充满全屏的输入框，专为大屏/横屏优化 */
        #editor {
            width: 100vw; 
            height: 100vh; 
            box-sizing: border-box;
            font-size: 36px;       /* 超大字体，看着舒服 */
            background: #1e1e1e; 
            color: #d4d4d4; 
            border: none; 
            outline: none; 
            padding: 30px;
            resize: none;          /* 禁止拖拽边缘 */
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <textarea id="editor" autofocus placeholder="v5回到f2信号等待语音输入..."></textarea>
    
    <script>
        
        const editor = document.getElementById('editor');
        
        // 核心监听器：只要收到 F2 信号，瞬间清零！
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F2') {
                editor.value = '';     // 变量清空
                e.preventDefault();    // 阻断默认行为
            }
        });

        // 保持焦点永远在输入框内
        document.addEventListener('click', () => editor.focus());
        /*

     这是v3版，用alt+c，还是不行

        // 核心监听器：放弃 F 键，改用更底层的 Alt + C
        document.addEventListener('keydown', function(e) {
            // 只要同时按下了 Alt 键，且按下的字母是 c 或 C
            if (e.altKey && e.key.toLowerCase() === 'c') {
                editor.value = '';     // 瞬间清空
                e.preventDefault();    // 阻断默认行为
            }
        });

        // 保持焦点
        document.addEventListener('click', () => editor.focus());
           */
        /*
        const editor = document.getElementById('editor');
        
        // 核心监听器：改用绝对安全的 Shift + Enter
        document.addEventListener('keydown', function(e) {
            // 如果按下了 Shift 键，并且按下的主键是 Enter (回车)
            if (e.shiftKey && e.key === 'Enter') {
                editor.value = '';     // 瞬间清空
                e.preventDefault();    // 阻断默认行为（防止它真的打出一个换行符）
            }
        });

        document.addEventListener('click', () => editor.focus());
    */
    </script>
</body>
</html>
